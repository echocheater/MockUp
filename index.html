<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera Gorden PWA - Fullscreen Frame & Object Zoom</title>
    
    <link rel="manifest" href="/MockUp/manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (min-width: 481px) {
            .app-container {
                border-radius: 24px;
                height: 85vh;
            }
        }

        .viewport {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
        }

        #webcam {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* Bingkai transparan/container UTUH full screen (100% x 100%), 
           tapi objek gambar di dalamnya yang melakukan zoom via background-size */
        .overlay-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('gorden1.webp'); 
            background-repeat: no-repeat; 
            background-position: center center;
            background-size: 80% auto; /* Objek gorden diatur ukurannya di sini */
            pointer-events: none;
            z-index: 2;
        }

        .collage-badge {
            position: absolute;
            top: 60px;
            right: 15px;
            background: rgba(255, 65, 108, 0.85);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
            backdrop-filter: blur(4px);
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .zoom-control-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 8px 15px;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(5px);
            z-index: 9;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: #cbd5e1;
        }

        .zoom-slider {
            width: 55%;
            accent-color: #ff416c;
            cursor: pointer;
        }

        .model-selector {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(5px);
            overflow-x: auto;
            white-space: nowrap;
            z-index: 9;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            scrollbar-width: none;
            min-height: 80px;
        }
        .model-selector::-webkit-scrollbar {
            display: none;
        }

        .thumb-btn {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(255,255,255,0.1);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .thumb-btn.active {
            border-color: #ff4757;
            box-shadow: 0 0 8px #ff4757;
            transform: scale(1.05);
        }

        #captureCanvas, #collageCanvas {
            display: none;
        }

        .control-panel {
            padding: 15px 20px 25px 20px;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .btn {
            background: #ffffff;
            color: #0b0f19;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
            transition: transform 0.1s ease, background 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-capture {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.4);
            border: 4px solid rgba(255,255,255,0.3);
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            padding: 0;
            justify-content: center;
            font-size: 18px;
        }

        .btn-icon.active {
            background: #ff416c;
            box-shadow: 0 0 12px rgba(255, 65, 108, 0.6);
        }

        .btn-icon.flash-on {
            background: #ffc107;
            color: #0b0f19;
            box-shadow: 0 0 10px #ffc107;
        }

        #resultModal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #resultImage {
            width: 100%;
            height: 65vh;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .modal-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }

        .instruction {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .custom-alert-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .custom-alert-box {
            background: #1e293b;
            border: 2px solid rgba(255, 65, 108, 0.3);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: alertShow 0.2s ease-out;
        }

        .custom-alert-text {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .btn-alert-close {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(255, 75, 43, 0.3);
        }

        @keyframes alertShow {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="instruction" id="instructionText">
        Pilih gorden, atur ukuran objek, lalu ambil foto.
    </div>

    <div class="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="overlay-image" id="overlayImg"></div>
        <div class="collage-badge" id="collageBadge">Kolase: 0/2</div>
    </div>

    <!-- Bar Pengatur Zoom Objek Gorden -->
    <div class="zoom-control-bar">
        <span>🔍 Zoom Objek:</span>
        <input type="range" id="zoomSlider" class="zoom-slider" min="30" max="200" step="2" value="80">
        <span id="zoomValue">80%</span>
    </div>

    <div class="model-selector" id="gordenMenu"></div>

    <canvas id="captureCanvas"></canvas>
    <canvas id="collageCanvas"></canvas>

    <div class="control-panel">
        <button class="btn btn-icon" id="collageToggleBtn" title="Mode Kolase">🖼️</button>
        <button class="btn btn-capture" id="captureBtn" title="Ambil Foto"></button>
        <button class="btn btn-icon" id="flashBtn" title="Nyalakan Flash" style="display: none;">⚡</button>
    </div>

    <div id="resultModal">
        <img id="resultImage" alt="Hasil Foto Gorden">
        <div class="modal-buttons">
            <a id="downloadBtn" class="btn" download="gorden-pilihan-warna.png" style="padding: 12px 16px; font-size: 14px;">💾 Simpan</a>
            <button id="shareBtn" class="btn" style="background: linear-gradient(135deg, #25d366, #128c7e); color: white; padding: 12px 16px; font-size: 14px;">🔗 Bagikan</button>
            <button class="btn" id="retakeBtn" style="background: rgba(255,255,255,0.2); color: white; padding: 12px 16px; font-size: 14px;">❌ Ulangi</button>
        </div>
    </div>

    <div class="custom-alert-overlay" id="customAlert">
        <div class="custom-alert-box">
            <div class="custom-alert-text" id="customAlertText">Pesan Peringatan</div>
            <button class="btn-alert-close" id="customAlertBtn">Oke</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const overlayImg = document.getElementById('overlayImg');
    const captureBtn = document.getElementById('captureBtn');
    const collageToggleBtn = document.getElementById('collageToggleBtn');
    const flashBtn = document.getElementById('flashBtn');
    const canvas = document.getElementById('captureCanvas');
    const collageCanvas = document.getElementById('collageCanvas');
    const resultModal = document.getElementById('resultModal');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const shareBtn = document.getElementById('shareBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const instructionText = document.getElementById('instructionText');
    const collageBadge = document.getElementById('collageBadge');

    const zoomSlider = document.getElementById('zoomSlider');
    const zoomValue = document.getElementById('zoomValue');

    const customAlert = document.getElementById('customAlert');
    const customAlertText = document.getElementById('customAlertText');
    const customAlertBtn = document.getElementById('customAlertBtn');

    let currentStream = null;
    let isFlashOn = false;
    let imageBlobData = null;
    let scalePercent = 80;

    let isCollageMode = false;
    let collageTargetCount = 2; 
    let capturedFrames = []; 

    function tampilkanAlert(pesan) {
        customAlertText.innerText = pesan;
        customAlert.style.display = 'flex';
    }

    customAlertBtn.addEventListener('click', () => {
        customAlert.style.display = 'none';
    });

    // Mengatur background-size secara dinamis agar bingkai tetap full screen, tapi objek di dalamnya yang zoom
    zoomSlider.addEventListener('input', (e) => {
        scalePercent = parseInt(e.target.value);
        overlayImg.style.backgroundSize = `${scalePercent}% auto`;
        zoomValue.innerText = `${scalePercent}%`;
    });

    function changeModel(fileName, element) {
        overlayImg.style.backgroundImage = `url('${fileName}')`;
        document.querySelectorAll('.thumb-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }

    async function muatGordenOtomatis() {
        const menuContainer = document.getElementById('gordenMenu');
        const username = 'echocheater'; 
        const repo = 'MockUp'; 
        const folderPath = ''; 

        try {
            const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
            if (!response.ok) throw new Error("Gagal mengambil file github");
            
            const files = await response.json();
            
            const gordenFiles = files
                .filter(file => file.name.toLowerCase().includes('gorden') && file.name.endsWith('.webp'))
                .sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

            if(gordenFiles.length === 0) {
                menuContainer.innerHTML = `<p style="font-size:12px; padding:10px;">Tidak ada gorden ditemukan.</p>`;
                return;
            }

            menuContainer.innerHTML = '';
            
            gordenFiles.forEach((file, index) => {
                const btn = document.createElement('button');
                btn.className = `thumb-btn ${index === 0 ? 'active' : ''}`;
                
                const fileUrl = `${file.name}?t=${new Date().getTime()}`;
                btn.style.backgroundImage = `url('${fileUrl}')`;
                btn.onclick = function() { changeModel(fileUrl, this); };
                
                menuContainer.appendChild(btn);

                if(index === 0) {
                    overlayImg.style.backgroundImage = `url('${fileUrl}')`;
                }
            });

        } catch (error) {
            console.error("Gagal memuat otomatis:", error);
            menuContainer.innerHTML = `
                <button class="thumb-btn active" style="background-image: url('gorden1.webp');" onclick="changeModel('gorden1.webp', this)"></button>
                <button class="thumb-btn" style="background-image: url('gorden2.webp');" onclick="changeModel('gorden2.webp', this)"></button>
            `;
        }
    }

    muatGordenOtomatis();

    async function startCamera() {
        isFlashOn = false;
        if(flashBtn) flashBtn.classList.remove('flash-on');
        
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        try {
            const constraints = {
                video: {
                    facingMode: 'environment',
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;

            setTimeout(() => {
                if(!currentStream) return;
                const track = currentStream.getVideoTracks()[0];
                const capabilities = track.getCapabilities ? track.getCapabilities() : {};
                
                if (capabilities.torch) {
                    flashBtn.style.display = 'flex';
                } else {
                    flashBtn.style.display = 'none';
                }
            }, 1000);

        } catch (err) {
            console.error("Gagal mengakses kamera:", err);
            tampilkanAlert("Tidak dapat mengakses kamera belakang. Pastikan izin kamera aktif.");
        }
    }

    startCamera();

    flashBtn.addEventListener('click', async () => {
        if (!currentStream) return;
        const track = currentStream.getVideoTracks()[0];
        
        try {
            isFlashOn = !isFlashOn;
            await track.applyConstraints({
                advanced: [{ torch: isFlashOn }]
            });

            if (isFlashOn) {
                flashBtn.classList.add('flash-on');
            } else {
                flashBtn.classList.remove('flash-on');
            }
        } catch (err) {
            console.error("Gagal mengontrol flash:", err);
            tampilkanAlert("Fitur Flash gagal diaktifkan pada browser ini.");
        }
    });

    collageToggleBtn.addEventListener('click', () => {
        if (!isCollageMode) {
            isCollageMode = true;
            collageTargetCount = 2; 
            capturedFrames = [];
            collageToggleBtn.classList.add('active');
            collageBadge.style.display = 'block';
            updateCollageUI();
        } else if (collageTargetCount === 2) {
            collageTargetCount = 4; 
            capturedFrames = [];
            updateCollageUI();
        } else {
            isCollageMode = false;
            capturedFrames = [];
            collageToggleBtn.classList.remove('active');
            collageBadge.style.display = 'none';
            instructionText.innerText = "Pilih gorden, atur ukuran objek, lalu ambil foto.";
        }
    });

    function updateCollageUI() {
        collageBadge.innerText = `Kolase: ${capturedFrames.length}/${collageTargetCount}`;
        instructionText.innerText = `Ambil Foto Ke-${capturedFrames.length + 1} (${collageTargetCount} Gambar). Sesuaikan zoom jika perlu.`;
    }

    function renderCollage() {
        const singleW = capturedFrames[0].width;
        const singleH = capturedFrames[0].height;

        let totalW = singleW;
        let totalH = singleH;

        if (collageTargetCount === 2) {
            totalW = singleW * 2;
            totalH = singleH;
            collageCanvas.width = totalW;
            collageCanvas.height = totalH;

            const ctx = collageCanvas.getContext('2d');
            ctx.drawImage(capturedFrames[0], 0, 0);
            ctx.drawImage(capturedFrames[1], singleW, 0);

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(singleW, 0);
            ctx.lineTo(singleW, totalH);
            ctx.stroke();

        } else if (collageTargetCount === 4) {
            totalW = singleW * 2;
            totalH = singleH * 2;
            collageCanvas.width = totalW;
            collageCanvas.height = totalH;

            const ctx = collageCanvas.getContext('2d');
            ctx.drawImage(capturedFrames[0], 0, 0);
            ctx.drawImage(capturedFrames[1], singleW, 0);
            ctx.drawImage(capturedFrames[2], 0, singleH);
            ctx.drawImage(capturedFrames[3], singleW, singleH);

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(singleW, 0);
            ctx.lineTo(singleW, totalH);
            ctx.moveTo(0, singleH);
            ctx.lineTo(totalW, singleH);
            ctx.stroke();
        }

        const dataUrl = collageCanvas.toDataURL('image/png');
        resultImage.src = dataUrl;
        downloadBtn.href = dataUrl;
        
        collageCanvas.toBlob((blob) => {
            imageBlobData = blob;
        }, 'image/png');

        resultModal.style.display = 'flex';
    }

    captureBtn.addEventListener('click', () => {
        const width = video.videoWidth;
        const height = video.videoHeight;

        if (width === 0 || height === 0) {
            tampilkanAlert("Kamera belum siap, mohon tunggu sebentar.");
            return;
        }

        const frameCanvas = document.createElement('canvas');
        frameCanvas.width = width;
        frameCanvas.height = height;
        const ctx = frameCanvas.getContext('2d');

        // 1. Gambar latar belakang kamera
        ctx.drawImage(video, 0, 0, width, height);

        const overlayImgUrl = window.getComputedStyle(overlayImg).backgroundImage;
        const cleanUrl = overlayImgUrl.slice(5, -2).replace(/['"]/g, ""); 

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = cleanUrl;

        img.onload = () => {
            // 2. Kalkulasi ukuran objek gorden sesuai persentase background-size di layar
            const imgAspect = img.naturalWidth / img.naturalHeight;
            const drawW = width * (scalePercent / 100);
            const drawH = drawW / imgAspect;
            const drawX = (width - drawW) / 2;
            const drawY = (height - drawH) / 2;

            ctx.drawImage(img, drawX, drawY, drawW, drawH);
            prosesHasilFrame(frameCanvas);
        };

        img.onerror = () => {
            prosesHasilFrame(frameCanvas);
        };
    });

    function prosesHasilFrame(frameCanvas) {
        if (!isCollageMode) {
            const dataUrl = frameCanvas.toDataURL('image/png');
            resultImage.src = dataUrl;
            downloadBtn.href = dataUrl;

            frameCanvas.toBlob((blob) => {
                imageBlobData = blob;
            }, 'image/png');

            resultModal.style.display = 'flex';
        } else {
            capturedFrames.push(frameCanvas);
            updateCollageUI();

            if (capturedFrames.length < collageTargetCount) {
                const flashEffect = document.createElement('div');
                flashEffect.style.position = 'absolute';
                flashEffect.style.top = '0';
                flashEffect.style.left = '0';
                flashEffect.style.width = '100%';
                flashEffect.style.height = '100%';
                flashEffect.style.background = '#ffffff';
                flashEffect.style.zIndex = '50';
                document.querySelector('.viewport').appendChild(flashEffect);
                
                setTimeout(() => flashEffect.remove(), 150);
            } else {
                renderCollage();
            }
        }
    }

    shareBtn.addEventListener('click', async () => {
        if (!imageBlobData) {
            tampilkanAlert("Gambar belum siap untuk dibagikan.");
            return;
        }

        const fileFoto = new File([imageBlobData], "simulasi-gorden.png", { type: "image/png" });

        if (navigator.canShare && navigator.canShare({ files: [fileFoto] })) {
            try {
                await navigator.share({
                    files: [fileFoto],
                    title: 'Simulasi Kain Gorden',
                    text: 'Halo, ini hasil simulasi variasi gorden pilihan saya!'
                });
            } catch (err) {
                console.error('Batal atau gagal membagikan:', err);
            }
        } else {
            tampilkanAlert("Browser Anda tidak mendukung share gambar langsung. Silakan gunakan tombol 'Simpan'.");
        }
    });

    retakeBtn.addEventListener('click', () => {
        resultModal.style.display = 'none';
        imageBlobData = null;
        if (isCollageMode) {
            capturedFrames = [];
            updateCollageUI();
        }
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/MockUp/sw.js', { scope: '/MockUp/' })
                .catch(err => console.error('PWA Service Worker gagal:', err));
        });
    }
</script>

</body>
</html>
