<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera Gorden WebP Full Screen</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (min-width: 481px) {
            .app-container {
                border-radius: 24px;
                height: 85vh;
            }
        }

        .viewport {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
        }

        /* 1. Video Kamera */
        #webcam {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* 2. Layer Overlay Gambar WebP Gorden */
        .overlay-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Menggunakan format .webp sebagai default */
            background-image: url('gorden1.webp'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            z-index: 2;
        }

        /* Menu Pilihan Model Gorden */
        .model-selector {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(5px);
            overflow-x: auto;
            white-space: nowrap;
            z-index: 9;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            scrollbar-width: none;
        }
        .model-selector::-webkit-scrollbar {
            display: none;
        }

        .thumb-btn {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: rgba(255,255,255,0.1);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .thumb-btn.active {
            border-color: #ff4757;
            box-shadow: 0 0 8px #ff4757;
            transform: scale(1.05);
        }

        /* Canvas tersembunyi */
        #captureCanvas {
            display: none;
        }

        /* Kontrol Panel */
        .control-panel {
            padding: 15px 20px 25px 20px;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .btn {
            background: #ffffff;
            color: #0b0f19;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
            transition: transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-capture {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.4);
            border: 4px solid rgba(255,255,255,0.3);
        }

        .btn-icon {
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            padding: 0;
            justify-content: center;
        }

        /* Hasil Preview Foto / Modal */
        #resultModal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #resultImage {
            width: 100%;
            height: 70vh;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .instruction {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="instruction">
        Pilih model gorden, lalu arahkan kamera untuk mengisi warnanya.
    </div>

    <div class="viewport">
        <!-- Elemen Video Kamera -->
        <video id="webcam" autoplay playsinline muted></video>
        
        <!-- Gambar Overlay WebP Transparan Gorden -->
        <div class="overlay-image" id="overlayImg"></div>
    </div>

    <!-- Tombol Pilihan Model Gorden Format .webp -->
    <div class="model-selector">
        <button class="thumb-btn active" style="background-image: url('gorden1.webp');" onclick="changeModel('gorden1.webp', this)"></button>
        <button class="thumb-btn" style="background-image: url('gorden2.webp');" onclick="changeModel('gorden2.webp', this)"></button>
        <button class="thumb-btn" style="background-image: url('gorden3.webp');" onclick="changeModel('gorden3.webp', this)"></button>
    </div>

    <!-- Canvas tersembunyi -->
    <canvas id="captureCanvas"></canvas>

    <!-- Panel Tombol Kontrol -->
    <div class="control-panel">
        <button class="btn btn-icon" id="switchCameraBtn" title="Ganti Kamera">🔄</button>
        <button class="btn btn-capture" id="captureBtn" title="Ambil Foto"></button>
        <button class="btn btn-icon" id="infoBtn" title="Info">ℹ️</button>
    </div>

    <!-- Tampilan Hasil Foto -->
    <div id="resultModal">
        <img id="resultImage" alt="Hasil Foto Gorden">
        <div class="modal-buttons">
            <a id="downloadBtn" class="btn" download="gorden-pilihan-warna.png">💾 Simpan Foto</a>
            <button class="btn" id="retakeBtn" style="background: rgba(255,255,255,0.2); color: white;">❌ Ulangi</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const overlayImg = document.getElementById('overlayImg');
    const captureBtn = document.getElementById('captureBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const canvas = document.getElementById('captureCanvas');
    const resultModal = document.getElementById('resultModal');
    const resultImage = document.getElementById('resultImage');
    const downloadBtn = document.getElementById('downloadBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const infoBtn = document.getElementById('infoBtn');

    let currentFacingMode = 'environment'; 
    let currentStream = null;

    // Fungsi ganti gorden
    function changeModel(fileName, element) {
        overlayImg.style.backgroundImage = `url('${fileName}')`;
        document.querySelectorAll('.thumb-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }

    // Akses Kamera
    async function startCamera(facingMode) {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }

        try {
            const constraints = {
                video: {
                    facingMode: facingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
        } catch (err) {
            console.error("Gagal mengakses kamera:", err);
            alert("Tidak dapat mengakses kamera. Pastikan izin kamera telah diberikan.");
        }
    }

    startCamera(currentFacingMode);

    switchCameraBtn.addEventListener('click', () => {
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        startCamera(currentFacingMode);
    });

    // Proses Ambil Foto
    captureBtn.addEventListener('click', () => {
        const width = video.videoWidth;
        const height = video.videoHeight;

        if (width === 0 || height === 0) {
            alert("Kamera belum siap, mohon tunggu sebentar.");
            return;
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        ctx.drawImage(video, 0, 0, width, height);

        const overlayImgUrl = window.getComputedStyle(overlayImg).backgroundImage;
        const cleanUrl = overlayImgUrl.slice(5, -2).replace(/['"]/g, ""); 

        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = cleanUrl;

        img.onload = () => {
            ctx.drawImage(img, 0, 0, width, height);
            const dataUrl = canvas.toDataURL('image/png'); // Hasil foto tetap disimpan PNG berkualitas tinggi
            resultImage.src = dataUrl;
            downloadBtn.href = dataUrl;
            resultModal.style.display = 'flex';
        };

        img.onerror = () => {
            const dataUrl = canvas.toDataURL('image/png');
            resultImage.src = dataUrl;
            downloadBtn.href = dataUrl;
            resultModal.style.display = 'flex';
        };
    });

    retakeBtn.addEventListener('click', () => {
        resultModal.style.display = 'none';
    });

    infoBtn.addEventListener('click', () => {
        alert("Tips: Pastikan file gambar Anda sudah berformat .webp dengan nama 'gorden1.webp', 'gorden2.webp', dll. di dalam satu folder.");
    });
</script>

</body>
</html>
